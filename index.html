<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --border: #2a2a2a;
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #444;
    --rest: #181818;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  header {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 52px);
    line-height: 1;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); opacity: 0.3; }

  .counter-block { text-align: right; }
  .counter-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 10vw, 68px);
    line-height: 1;
    color: var(--accent);
  }
  .counter-label {
    font-size: clamp(9px, 2vw, 11px);
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .year-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    width: 100%;
    max-width: 860px;
  }
  .year-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    width: 34px; height: 34px;
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .year-btn:hover { border-color: var(--accent); color: var(--accent); }
  .year-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 3px; color: var(--text);
  }
  .streak-info {
    margin-left: auto;
    font-size: 11px; color: var(--muted); letter-spacing: 1px; text-align: right;
  }
  .streak-info strong { color: var(--accent); font-size: 13px; }

  .calendar {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px 32px;
  }

  @media (max-width: 540px) {
    .calendar { grid-template-columns: 1fr; }
  }

  .month-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .dow-header {
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: center;
    padding-bottom: 4px;
    text-transform: uppercase;
  }
  .dow-header.weekend { color: #333; }

  .day {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--rest);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s, transform .1s, border-color .1s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(8px, 1.8vw, 11px);
    color: var(--muted);
    user-select: none;
  }

  .day:hover { border-color: var(--accent); transform: scale(1.08); z-index: 10; }
  .day { will-change: auto; }
  .day:hover { will-change: transform; }
  .day.trained { background: var(--accent); border-color: var(--accent); color: #0e0e0e; font-weight: 500; }
  .day.today { border-color: #fff; border-width: 2px; color: #fff; }
  .day.today.trained { color: #0e0e0e; }
  .day.future { opacity: 0.2; cursor: default; }
  .day.future:hover { transform: none; border-color: var(--border); }
  .day.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }

  #tip {
    position: fixed;
    background: #111;
    color: var(--text);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    border: 1px solid var(--border);
    z-index: 200;
    transition: opacity .12s;
    font-family: 'DM Mono', monospace;
  }

  .bottom-bar {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-box {
    width: 13px; height: 13px;
    border-radius: 2px; border: 1px solid var(--border);
  }
  .legend-box.trained { background: var(--accent); border-color: var(--accent); }
  .legend-box.rest { background: var(--rest); }

  .btn-today {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-today:hover { border-color: var(--accent); color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--accent);
    color: #0e0e0e;
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 500; letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 4px;
    opacity: 0; pointer-events: none;
    transition: all .25s; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">IRON<span>LOG</span></div>
  <div class="counter-block">
    <div class="counter-num" id="totalCount">0</div>
    <div class="counter-label">treinos em <span id="yearLabel"></span></div>
  </div>
</header>

<div class="year-nav">
  <button class="year-btn" onclick="changeYear(-1)">‹</button>
  <div class="year-display" id="yearDisplay"></div>
  <button class="year-btn" onclick="changeYear(1)">›</button>
  <div class="streak-info" id="streakInfo"></div>
</div>

<div class="calendar" id="calendar"></div>

<div class="bottom-bar">
  <div class="legend-item"><div class="legend-box trained"></div> Treino</div>
  <div class="legend-item"><div class="legend-box rest"></div> Descanso</div>
  <button class="btn-today" onclick="goToday()">Hoje</button>
</div>

<div id="tip"></div>
<div class="toast" id="toast"></div>

<script>
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DOWS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  const API_URL = 'https://script.google.com/macros/s/AKfycbwt6409AEq1piRQXDmUa6eKejRhrRQxjC4AwmNdDM9sQtII6XOaDS5_xaYNRiwkHG-7/exec';
  const USER_ID = 'ricardo';

  let currentYear = new Date().getFullYear();
  let trained = {};

  function dateKey(y, m, d) {
    return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }

  async function loadTrained() {
    try {
      const res = await fetch(`${API_URL}?user_id=${encodeURIComponent(USER_ID)}`);
      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || 'Erro ao carregar treinos');
      }

      trained = data.trained || {};
      render();
    } catch (err) {
      console.error(err);
      showToast('Erro ao carregar treinos');
    }
  }

  async function saveTraining(date, isTrained) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify({
        user_id: USER_ID,
        date: date,
        trained: isTrained
      })
    });

    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || 'Erro ao salvar treino');
    }
  }

  async function toggle(k, el) {
    const wasTrained = !!trained[k];
    const nextValue = !wasTrained;

    try {
      if (nextValue) {
        trained[k] = 1;
        el.classList.add('trained');
        showToast('💪 Treino registrado!');
      } else {
        delete trained[k];
        el.classList.remove('trained');
        showToast('Treino removido');
      }

      updateCounter();
      updateStreak();

      await saveTraining(k, nextValue);
    } catch (err) {
      console.error(err);

      if (wasTrained) {
        trained[k] = 1;
        el.classList.add('trained');
      } else {
        delete trained[k];
        el.classList.remove('trained');
      }

      updateCounter();
      updateStreak();
      showToast('Erro ao salvar');
    }
  }

  function updateCounter() {
    const count = Object.keys(trained).filter(k => k.startsWith(currentYear + '-')).length;
    document.getElementById('totalCount').textContent = count;
    document.getElementById('yearLabel').textContent = currentYear;
    document.getElementById('yearDisplay').textContent = currentYear;
  }

  function updateStreak() {
    const today = new Date();
    let streak = 0, d = new Date(today);
    let guard = 0;

    while (guard++ < 365 && trained[dateKey(d.getFullYear(), d.getMonth(), d.getDate())]) {
      streak++;
      d.setDate(d.getDate() - 1);
    }

    const el = document.getElementById('streakInfo');
    el.innerHTML = streak > 0
      ? `🔥 Sequência: <strong>${streak} dia${streak > 1 ? 's' : ''}</strong>`
      : '';
  }

  function buildMonth(year, monthIdx, today, todayKey) {
    const block = document.createElement('div');
    block.className = 'month-block';
    block.id = `month-${monthIdx}`;

    const header = document.createElement('div');
    header.className = 'month-header';
    header.textContent = MONTHS[monthIdx];
    block.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'week-grid';

    DOWS.forEach((d, i) => {
      const cell = document.createElement('div');
      cell.className = 'dow-header' + (i === 0 || i === 6 ? ' weekend' : '');
      cell.textContent = d;
      grid.appendChild(cell);
    });

    const firstDay = new Date(year, monthIdx, 1).getDay();
    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const k = dateKey(year, monthIdx, d);
      const dateObj = new Date(year, monthIdx, d);
      const isFuture = dateObj > today;

      const el = document.createElement('div');
      el.className = 'day';
      el.textContent = d;

      if (trained[k]) el.classList.add('trained');
      if (k === todayKey) el.classList.add('today');
      if (isFuture) el.classList.add('future');

      const dow = DOWS[dateObj.getDay()];
      el.setAttribute('data-tip', `${dow}, ${d} de ${MONTHS[monthIdx]}`);

      if (!isFuture) {
        el.addEventListener('click', () => toggle(k, el));
      }

      grid.appendChild(el);
    }

    block.appendChild(grid);
    return block;
  }

  function render() {
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    const today = new Date();
    today.setHours(23, 59, 59, 999);
    const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

    for (let m = 0; m < 12; m++) {
      cal.appendChild(buildMonth(currentYear, m, today, todayKey));
    }

    updateCounter();
    updateStreak();
  }

  function changeYear(delta) {
    currentYear += delta;
    render();
  }

  function goToday() {
    currentYear = new Date().getFullYear();
    render();

    const m = new Date().getMonth();
    const el = document.getElementById(`month-${m}`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  const tip = document.getElementById('tip');

  document.getElementById('calendar').addEventListener('mouseover', e => {
    const day = e.target.closest('.day:not(.empty):not(.future)');
    if (!day) return;

    const label = day.getAttribute('data-tip');
    if (!label) return;

    tip.textContent = label;
    tip.style.opacity = '1';
  });

  document.getElementById('calendar').addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top  = (e.clientY - 28) + 'px';
  });

  document.getElementById('calendar').addEventListener('mouseout', e => {
    const day = e.target.closest('.day');
    if (day) tip.style.opacity = '0';
  });

  loadTrained();
</script>
</body>
</html>
